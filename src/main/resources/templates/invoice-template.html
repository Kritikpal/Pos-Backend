<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>

    <style>
        @page {
            size: A4;
            margin: 20px;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #333;
        }

        .invoice-box {
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
        }

        .details {
            margin-bottom: 20px;
        }

        .details p {
            margin: 4px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background-color: #f5f5f5;
        }

        table th, table td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        table th {
            text-align: left;
        }

        .right {
            text-align: right;
        }

        .total {
            margin-top: 20px;
            text-align: right;
            font-size: 14px;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="invoice-box">

    <!-- Header -->
    <div class="header">
        <h1>INVOICE</h1>
    </div>

    <!-- Order Details -->
    <div class="details">
        <p>
            <strong>Order ID:</strong>
            <span th:text="${invoice.orderId}"></span>
        </p>

        <p>
            <strong>Date:</strong>
            <span th:text="${#temporals.format(T(java.time.LocalDateTime).now(), 'dd-MM-yyyy HH:mm')}"></span>
        </p>
    </div>

    <!-- Items Table -->
    <table>
        <thead>
        <tr>
            <th>Item</th>
            <th class="right">Qty</th>
            <th class="right">Price</th>
            <th class="right">Total</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="item : ${invoice.items}">
            <td th:text="${item.name}"></td>
            <td class="right" th:text="${item.quantity}"></td>
            <td class="right" th:text="${item.price}"></td>
            <td class="right"
                th:text="${item.quantity * item.price}"></td>
        </tr>
        </tbody>
    </table>

    <!-- Total -->
    <div class="total">
        Total: ₹ <span th:text="${invoice.totalPrice}"></span>
    </div>

</div>

</body>
</html>
