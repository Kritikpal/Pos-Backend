<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>

    <style>
        @page {
            size: A4;
            margin: 20px;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #333;
        }

        .invoice-box {
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
        }

        .details {
            margin-bottom: 20px;
        }

        .details p {
            margin: 4px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background-color: #f5f5f5;
        }

        table th, table td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        table th {
            text-align: left;
        }

        .right {
            text-align: right;
        }

        .total {
            margin-top: 20px;
            text-align: right;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="invoice-box">
    <div class="header">
        <h1>INVOICE</h1>
    </div>

    <div class="details">
        <p>
            <strong>Order ID:</strong>
            <span th:text="${invoice.orderId}"></span>
        </p>
        <p>
            <strong>Date:</strong>
            <span th:text="${#temporals.format(T(java.time.LocalDateTime).now(), 'dd-MM-yyyy HH:mm')}"></span>
        </p>
        <p th:if="${invoice.sellerRegistrationNumber != null}">
            <strong>Seller Tax ID:</strong>
            <span th:text="${invoice.sellerRegistrationNumber}"></span>
        </p>
        <p th:if="${invoice.buyerName != null}">
            <strong>Buyer:</strong>
            <span th:text="${invoice.buyerName}"></span>
        </p>
        <p th:if="${invoice.buyerTaxId != null}">
            <strong>Buyer Tax ID:</strong>
            <span th:text="${invoice.buyerTaxId}"></span>
        </p>
        <p th:if="${invoice.buyerTaxCategory != null}">
            <strong>Buyer Tax Category:</strong>
            <span th:text="${invoice.buyerTaxCategory}"></span>
        </p>
    </div>

    <table>
        <thead>
        <tr>
            <th>Item</th>
            <th class="right">Qty</th>
            <th class="right">Unit</th>
            <th class="right">Tax</th>
            <th class="right">Total</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="item : ${invoice.items}">
            <td th:text="${item.name}"></td>
            <td class="right" th:text="${item.quantity}"></td>
            <td class="right" th:text="${item.price}"></td>
            <td class="right" th:text="${item.taxAmount}"></td>
            <td class="right" th:text="${item.total}"></td>
        </tr>
        </tbody>
    </table>

    <table style="margin-top: 16px;">
        <tbody>
        <tr>
            <td><strong>Subtotal</strong></td>
            <td class="right" th:text="${invoice.subtotalAmount}"></td>
        </tr>
        <tr>
            <td><strong>Discount</strong></td>
            <td class="right" th:text="${invoice.discountAmount}"></td>
        </tr>
        <tr>
            <td><strong>Taxable Amount</strong></td>
            <td class="right" th:text="${invoice.taxableAmount}"></td>
        </tr>
        <tr th:each="tax : ${invoice.taxSummaries}">
            <td th:text="${tax.taxDisplayName}"></td>
            <td class="right" th:text="${tax.taxAmount}"></td>
        </tr>
        <tr th:if="${invoice.feeAmount != null && invoice.feeAmount > 0}">
            <td><strong>Fees</strong></td>
            <td class="right" th:text="${invoice.feeAmount}"></td>
        </tr>
        </tbody>
    </table>

    <div class="total">
        Total: Rs <span th:text="${invoice.grandTotal}"></span>
    </div>

</div>

</body>
</html>
