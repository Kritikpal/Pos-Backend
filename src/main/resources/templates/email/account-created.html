<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Your POS account was created</title>
</head>
<body style="margin:0;padding:24px;background:#f5f7fb;font-family:Arial,sans-serif;color:#1f2937;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:12px;padding:32px;">
                <tr>
                    <td>
                        <h1 style="margin:0 0 16px;font-size:24px;">Your POS account is ready</h1>
                        <p style="margin:0 0 16px;">Hello,</p>
                        <p style="margin:0 0 16px;">Your account has been created with the following details:</p>
                        <p style="margin:0 0 8px;"><strong>Email:</strong> <span th:text="${email}">user@example.com</span></p>
                        <p style="margin:0 0 24px;"><strong>Temporary password:</strong> <span th:text="${rawPassword}">password</span></p>
                        <p style="margin:0 0 24px;">
                            <a th:href="${loginUrl}" style="display:inline-block;padding:12px 20px;background:#111827;color:#ffffff;text-decoration:none;border-radius:8px;">Sign in to POS</a>
                        </p>
                        <p style="margin:0 0 12px;">Please change your password after signing in.</p>
                        <p style="margin:0;">Thanks.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
