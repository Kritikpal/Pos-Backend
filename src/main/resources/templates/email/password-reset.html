<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password reset request</title>
</head>
<body style="margin:0;padding:24px;background:#f5f7fb;font-family:Arial,sans-serif;color:#1f2937;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:12px;padding:32px;">
                <tr>
                    <td>
                        <h1 style="margin:0 0 16px;font-size:24px;">Reset your password</h1>
                        <p style="margin:0 0 16px;">Hello,</p>
                        <p style="margin:0 0 24px;">We received a request to reset the password for <strong th:text="${email}">user@example.com</strong>.</p>
                        <p style="margin:0 0 24px;">
                            <a th:href="${passwordResetUrl + '?token=' + resetToken}" style="display:inline-block;padding:12px 20px;background:#111827;color:#ffffff;text-decoration:none;border-radius:8px;">Reset password</a>
                        </p>
                        <p style="margin:0 0 12px;">This link will expire in 24 hours.</p>
                        <p style="margin:0 0 12px;">If you did not request this, you can ignore this email.</p>
                        <p style="margin:0;">Thanks.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
